name: Rust CI

on:
  workflow_call:
    inputs:
      workspace:
        description: "Workspace directory (contains Cargo.toml)"
        required: false
        default: "."
        type: string
      features:
        description: "Features for cargo test (e.g. 'extended')"
        required: false
        default: ""
        type: string
      rust-version:
        description: "Rust toolchain"
        required: false
        default: "stable"
        type: string

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.workspace }}
      - name: Format
        run: cargo fmt --check --all
        working-directory: ${{ inputs.workspace }}
      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
        working-directory: ${{ inputs.workspace }}
      - name: Test
        run: cargo test --all-targets --features ${{ inputs.features || 'default' }}
        working-directory: ${{ inputs.workspace }}
