name: Inauguration CI

on:
  workflow_call:
    inputs:
      inauguration-repo:
        description: "GitHub repo with the in compiler"
        required: false
        default: "tschk/inauguration"
        type: string
      inauguration-ref:
        description: "Git ref for the compiler"
        required: false
        default: "master"
        type: string
      inauguration-path:
        description: "Checkout path for compiler"
        required: false
        default: "inauguration"
        type: string
      rust-version:
        description: "Rust toolchain"
        required: false
        default: "stable"
        type: string
      build-command:
        description: 'Build command (use $IN_BIN instead of bare "in" — "in" is a bash keyword)'
        required: false
        default: ""
        type: string
      test-command:
        description: "Shell command to run after build"
        required: false
        default: ""
        type: string
      install-deps:
        description: "APT packages to install (space-separated)"
        required: false
        default: ""
        type: string
      run-clippy:
        description: "Run clippy/fmt on the compiler"
        required: false
        default: false
        type: boolean
      extra-build-features:
        description: "Cargo features for compiler build"
        required: false
        default: "extended"
        type: string

env:
  IN_BIN: ${{ github.workspace }}/${{ inputs.inauguration-path }}/in-cli/target/release/in
  IN: ${{ github.workspace }}/${{ inputs.inauguration-path }}/in-cli/target/release/in
  INAUGURATION_DIR: ${{ github.workspace }}/${{ inputs.inauguration-path }}

jobs:
  ci:
    name: Inauguration CI
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.inauguration-repo }}
          ref: ${{ inputs.inauguration-ref }}
          path: ${{ inputs.inauguration-path }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
          components: ${{ inputs.run-clippy && 'clippy, rustfmt' || '' }}
      - name: Build in compiler
        run: cargo build --release --bin in --features ${{ inputs.extra-build-features || 'extended' }}
        working-directory: ${{ inputs.inauguration-path }}/in-cli
      - name: Add in to PATH
        run: |
          echo "${{ github.workspace }}/${{ inputs.inauguration-path }}/in-cli/target/release" >> "$GITHUB_PATH"
          echo "${{ env.IN_BIN }}"
      - name: Clippy
        if: inputs.run-clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
        working-directory: ${{ inputs.inauguration-path }}/in-cli
      - name: Format
        if: inputs.run-clippy
        run: cargo fmt --check
        working-directory: ${{ inputs.inauguration-path }}/in-cli
      - name: Install dependencies
        if: inputs.install-deps != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.install-deps }}
      - name: Build project
        if: inputs.build-command != ''
        run: ${{ inputs.build-command }}
      - name: Test
        if: inputs.test-command != ''
        run: ${{ inputs.test-command }}
