name: Space CI

on:
  workflow_call:
    inputs:
      inauguration-ref:
        description: "Git ref for the inauguration compiler"
        required: false
        default: "master"
        type: string
      inauguration-path:
        description: "Relative path for inauguration checkout"
        required: false
        default: "inauguration"
        type: string
      rust-version:
        description: "Rust toolchain"
        required: false
        default: "stable"
        type: string
      qemu-test:
        description: "Run QEMU boot verification"
        required: false
        default: true
        type: boolean
      sci-check:
        description: "Validate SCI component metadata"
        required: false
        default: true
        type: boolean
      run-network-test:
        description: "Run network driver test"
        required: false
        default: false
        type: boolean

jobs:
  build-compiler:
    name: Build in compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: tschk/inauguration
          path: ${{ inputs.inauguration-path }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.inauguration-path }}
      - name: Build in binary
        run: cargo build --release --bin in --features extended
        working-directory: ${{ inputs.inauguration-path }}
      - name: Upload in binary
        uses: actions/upload-artifact@v4
        with:
          name: in-binary
          path: ${{ inputs.inauguration-path }}/target/release/in
          retention-days: 1

  compile-kernel:
    name: Compile kernel with in
    needs: build-compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: tschk/inauguration
          path: ${{ inputs.inauguration-path }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.inauguration-path }}
      - name: Build in binary
        run: cargo build --release --bin in --features extended
        working-directory: ${{ inputs.inauguration-path }}
      - name: Add in to PATH
        run: echo "$PWD/${{ inputs.inauguration-path }}/target/release" >> "$GITHUB_PATH"
      - name: Compile kernel
        run: |
          mkdir -p target
          in build --path kernel/kernel-root.in --module-id SpaceKernel --verbose
        working-directory: .

  qemu-boot:
    if: inputs.qemu-test
    name: QEMU boot check
    needs: build-compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: tschk/inauguration
          path: ${{ inputs.inauguration-path }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.inauguration-path }}
      - name: Build in binary
        run: cargo build --release --bin in --features extended
        working-directory: ${{ inputs.inauguration-path }}
      - name: Add in to PATH
        run: echo "$PWD/${{ inputs.inauguration-path }}/target/release" >> "$GITHUB_PATH"
      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86-64 nasm clang
      - name: Run QEMU boot check
        run: bash scripts/check-qemu-boot.sh

  sci-validation:
    if: inputs.sci-check
    name: SCI validation
    needs: build-compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: tschk/inauguration
          path: ${{ inputs.inauguration-path }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.inauguration-path }}
      - name: Build in binary
        run: cargo build --release --bin in --features extended
        working-directory: ${{ inputs.inauguration-path }}
      - name: Add in to PATH
        run: echo "$PWD/${{ inputs.inauguration-path }}/target/release" >> "$GITHUB_PATH"
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y nasm clang
      - name: Validate SCI metadata
        run: bash scripts/check-sci-contract.sh

  network-test:
    if: inputs.run-network-test
    name: Network driver test
    needs: build-compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: tschk/inauguration
          path: ${{ inputs.inauguration-path }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ inputs.inauguration-path }}
      - name: Build in binary
        run: cargo build --release --bin in --features extended
        working-directory: ${{ inputs.inauguration-path }}
      - name: Add in to PATH
        run: echo "$PWD/${{ inputs.inauguration-path }}/target/release" >> "$GITHUB_PATH"
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86-64 nasm clang
      - name: Run network test
        run: bash scripts/check-network.sh
