name: Space CI

on:
  workflow_call:
    inputs:
      inauguration-ref:
        required: false
        default: "master"
        type: string
      inauguration-path:
        required: false
        default: "inauguration"
        type: string
      rust-version:
        required: false
        default: "stable"
        type: string
      qemu-test:
        required: false
        default: true
        type: boolean
      sci-check:
        required: false
        default: true
        type: boolean
      run-network-test:
        required: false
        default: false
        type: boolean

env:
  IN_CLI: ${{ inputs.inauguration-path }}/in-cli

jobs:
  build-compiler:
    name: Build in compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: tschk/inauguration
          path: ${{ inputs.inauguration-path }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
      - name: Build in binary
        run: cargo build --release --bin in --features extended
        working-directory: ${{ env.IN_CLI }}
      - name: Upload in binary
        uses: actions/upload-artifact@v4
        with:
          name: in-binary
          path: ${{ env.IN_CLI }}/target/release/in
          retention-days: 1

  compile-kernel:
    name: Compile kernel with in
    needs: build-compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: tschk/inauguration
          path: ${{ inputs.inauguration-path }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
      - name: Download in binary
        uses: actions/download-artifact@v4
        with:
          name: in-binary
          path: ${{ env.IN_CLI }}/target/release
      - name: Make in executable
        run: chmod +x ${{ env.IN_CLI }}/target/release/in
      - name: Add in to PATH
        run: echo "$PWD/${{ env.IN_CLI }}/target/release" >> "$GITHUB_PATH"
      - name: Compile kernel
        run: |
          mkdir -p target
          in build --path kernel/kernel-root.in --module-id SpaceKernel --verbose

  qemu-boot:
    if: inputs.qemu-test
    name: QEMU boot check
    needs: build-compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: tschk/inauguration
          path: ${{ inputs.inauguration-path }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
      - name: Download in binary
        uses: actions/download-artifact@v4
        with:
          name: in-binary
          path: ${{ env.IN_CLI }}/target/release
      - name: Make in executable
        run: chmod +x ${{ env.IN_CLI }}/target/release/in
      - name: Add in to PATH
        run: echo "$PWD/${{ env.IN_CLI }}/target/release" >> "$GITHUB_PATH"
      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86-64 nasm clang
      - name: Run QEMU boot check
        run: bash scripts/check-qemu-boot.sh

  sci-validation:
    if: inputs.sci-check
    name: SCI validation
    needs: build-compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: tschk/inauguration
          path: ${{ inputs.inauguration-path }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
      - name: Download in binary
        uses: actions/download-artifact@v4
        with:
          name: in-binary
          path: ${{ env.IN_CLI }}/target/release
      - name: Make in executable
        run: chmod +x ${{ env.IN_CLI }}/target/release/in
      - name: Add in to PATH
        run: echo "$PWD/${{ env.IN_CLI }}/target/release" >> "$GITHUB_PATH"
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y nasm clang
      - name: Validate SCI metadata
        run: bash scripts/check-sci-contract.sh

  network-test:
    if: inputs.run-network-test
    name: Network driver test
    needs: build-compiler
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: tschk/inauguration
          path: ${{ inputs.inauguration-path }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}
      - name: Download in binary
        uses: actions/download-artifact@v4
        with:
          name: in-binary
          path: ${{ env.IN_CLI }}/target/release
      - name: Make in executable
        run: chmod +x ${{ env.IN_CLI }}/target/release/in
      - name: Add in to PATH
        run: echo "$PWD/${{ env.IN_CLI }}/target/release" >> "$GITHUB_PATH"
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86-64 nasm clang
      - name: Run network test
        run: bash scripts/check-network.sh
